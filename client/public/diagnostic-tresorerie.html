const C = {vk:"#076739",vp:"#03341C",va:"#129B58",op:"#C4A41E",oc:"#E1C850",of:"#967D0F",n:"#0F0F0F",bc:"#F5F5F0",ch:"#232323"};

const QS = [
  "Je connais mon solde de trésorerie exact à cet instant.",
  "Je dispose d'un budget de trésorerie prévisionnel mensuel.",
  "Je connais le Besoin en Fonds de Roulement (BFR) de mon officine.",
  "Je connais le délai moyen de paiement de mes clients crédit.",
  "Je fais un rapprochement bancaire au moins une fois par mois.",
  "Je sais combien mon officine génère réellement de cash après toutes les charges.",
  "Je peux identifier mes 3 plus gros postes de dépenses ce mois-ci.",
  "Je contrôle les écarts de caisse au quotidien.",
  "J'ai un outil de suivi financier autre que le bilan annuel du comptable.",
  "Si je m'absente 2 semaines, quelqu'un peut piloter la trésorerie à ma place.",
];

const SL = [{v:0,l:"Non",c:"#DC2626"},{v:1,l:"Partiellement",c:C.of},{v:2,l:"Oui",c:C.vk}];

function getLevel(s){
  if(s<=9) return {l:"ALERTE",e:"🔴",c:"#DC2626",bg:"#FEF2F2",bd:"#FECACA",m:"Vous découvrirez les problèmes quand il sera trop tard.",d:"Votre officine fonctionne, mais sans visibilité financière réelle. Les décisions se prennent au ressenti — pas sur des données. Chaque mois qui passe sans pilotage vous coûte de l'argent."};
  if(s<=15) return {l:"ZONE GRISE",e:"🟡",c:C.of,bg:"#FFFBEB",bd:"#FDE68A",m:"Vous gérez, mais vous ne pilotez pas encore.",d:"Certains réflexes sont là, mais il manque la structure pour anticiper. Vous êtes vulnérable aux imprévus financiers. Un seul incident peut fragiliser votre trésorerie."};
  return {l:"PHARMACIEN STRATÈGE",e:"🟢",c:C.vk,bg:"#F0FDF4",bd:"#BBF7D0",m:"Votre officine est pilotée. Bravo !",d:"Vous avez les bons outils, les bons réflexes et une vision claire de votre trésorerie. Vous pouvez maintenant optimiser et structurer la croissance."};
}

function App(){
  const [ans,setAns]=useState({});
  const [step,setStep]=useState("intro");
  const [cq,setCq]=useState(0);
  const [showC,setShowC]=useState(false);
  const [contact,setContact]=useState({nom:"",pharmacie:"",tel:"",email:""});
  const [sent,setSent]=useState(false);

  const cnt=Object.keys(ans).length;
  const tot=Object.values(ans).reduce((a,b)=>a+b,0);
  const done=cnt===QS.length;
  const lv=getLevel(tot);

  const pick=(i,v)=>{setAns(p=>({...p,[i]:v}));if(i<QS.length-1)setTimeout(()=>setCq(i+1),300);};
  const reset=()=>{setAns({});setCq(0);setStep("intro");setShowC(false);setSent(false);setContact({nom:"",pharmacie:"",tel:"",email:""});};

  if(step==="intro") return (
    <div style={{minHeight:"100vh",background:`linear-gradient(180deg,${C.vp} 0%,${C.n} 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{maxWidth:480,textAlign:"center"}}>
        <img src={LOGO} alt="Kemet" style={{height:50,marginBottom:8,filter:"brightness(0) invert(1)"}}/>
        <div style={{width:60,height:2,background:C.op,margin:"0 auto 32px"}}/>
        <h1 style={{color:"#fff",fontSize:28,fontWeight:800,lineHeight:1.2,margin:"0 0 12px"}}>PHARMACIEN STRATÈGE</h1>
        <p style={{color:C.oc,fontSize:16,fontStyle:"italic",margin:"0 0 32px",lineHeight:1.5}}>Votre officine fait du chiffre…<br/>mais savez-vous vraiment où passe l'argent ?</p>
        <div style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:"28px 24px",marginBottom:32,border:"1px solid rgba(196,164,30,0.2)"}}>
          <p style={{color:"rgba(255,255,255,0.7)",fontSize:14,margin:"0 0 8px"}}>Évaluez votre niveau de pilotage financier</p>
          <p style={{color:"#fff",fontSize:15,margin:"0 0 4px",lineHeight:1.6}}><strong>10 questions</strong> · 2 minutes · Résultat immédiat</p>
          <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,margin:0}}>Découvrez si vous pilotez votre officine… ou si vous la subissez.</p>
        </div>
        <button onClick={()=>setStep("quiz")} style={{background:`linear-gradient(135deg,${C.op},${C.of})`,color:C.vp,border:"none",borderRadius:12,padding:"16px 48px",fontSize:16,fontWeight:700,boxShadow:"0 4px 20px rgba(196,164,30,0.3)",position:"relative",zIndex:10,cursor:"pointer"}}>COMMENCER LE DIAGNOSTIC</button>
        <p style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginTop:24}}>Gratuit · Confidentiel · Sans engagement</p>
      </div>
    </div>
  );

  if(step==="quiz") return (
    <div style={{minHeight:"100vh",background:C.bc}}>
      <div style={{background:C.vp,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <img src={LOGO} alt="Kemet" style={{height:24,filter:"brightness(0) invert(1)"}}/>
        <span style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{cnt}/{QS.length} réponses</span>
      </div>
      <div style={{height:4,background:"#E5E7EB"}}><div style={{height:"100%",background:`linear-gradient(90deg,${C.vk},${C.op})`,width:`${(cnt/QS.length)*100}%`,transition:"width 0.5s",borderRadius:"0 2px 2px 0"}}/></div>
      <div style={{maxWidth:560,margin:"0 auto",padding:"24px 20px"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <span style={{fontSize:36,fontWeight:800,color:C.vp}}>{tot}</span>
          <span style={{fontSize:18,color:"#9CA3AF",fontWeight:500}}> / 20</span>
        </div>
        {QS.map((q,i)=>{
          const active=i===cq,answered=ans[i]!==undefined;
          return <div key={i} onClick={()=>setCq(i)} style={{background:"#fff",borderRadius:12,padding:"16px 20px",marginBottom:10,border:active?`2px solid ${C.vk}`:answered?`1px solid ${C.va}40`:"1px solid #E5E7EB",opacity:(!answered&&i>cq)?0.5:1,transition:"all 0.3s",boxShadow:active?"0 2px 12px rgba(7,103,57,0.1)":"none"}}>
            <div style={{display:"flex",gap:12,marginBottom:12}}>
              <span style={{background:answered?C.vk:"#F3F4F6",color:answered?"#fff":"#9CA3AF",width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0,transition:"all 0.3s"}}>{answered?"✓":i+1}</span>
              <p style={{margin:0,fontSize:14,color:C.ch,lineHeight:1.5,fontWeight:active?600:400}}>{q}</p>
            </div>
            <div style={{display:"flex",gap:8,marginLeft:40}}>
              {SL.map(s=><button key={s.v} onClick={e=>{e.stopPropagation();pick(i,s.v);}} style={{flex:1,padding:"8px 4px",borderRadius:8,border:ans[i]===s.v?`2px solid ${s.c}`:"1px solid #E5E7EB",background:ans[i]===s.v?s.c+"10":"#fff",color:ans[i]===s.v?s.c:"#6B7280",fontSize:12,fontWeight:ans[i]===s.v?700:500,transition:"all 0.2s"}}><div style={{fontSize:16,marginBottom:2}}>{s.v}</div>{s.l}</button>)}
            </div>
          </div>;
        })}
        {done&&<div style={{textAlign:"center",marginTop:24,marginBottom:40}}>
          <button onClick={()=>setStep("result")} style={{background:`linear-gradient(135deg,${C.vk},${C.vp})`,color:"#fff",border:"none",borderRadius:12,padding:"16px 48px",fontSize:16,fontWeight:700,boxShadow:"0 4px 20px rgba(7,103,57,0.3)",position:"relative",zIndex:10,cursor:"pointer"}}>VOIR MON RÉSULTAT →</button>
        </div>}
      </div>
    </div>
  );

  if(step==="result") return (
    <div style={{minHeight:"100vh",background:`linear-gradient(180deg,${C.vp} 0%,${C.n} 100%)`}}>
      <div style={{padding:"16px 20px",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
        <img src={LOGO} alt="Kemet" style={{height:28,filter:"brightness(0) invert(1)"}}/>
        <span style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>DIAGNOSTIC TRÉSORERIE</span>
      </div>
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 20px 40px"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:140,height:140,borderRadius:"50%",border:`4px solid ${lv.c}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",background:lv.c+"15",boxShadow:`0 0 40px ${lv.c}30`}}>
            <span style={{fontSize:48,fontWeight:800,color:"#fff"}}>{tot}</span>
            <span style={{fontSize:14,color:"rgba(255,255,255,0.5)"}}>/ 20</span>
          </div>
          <span style={{display:"inline-block",background:lv.c,color:"#fff",padding:"6px 20px",borderRadius:20,fontSize:13,fontWeight:700,letterSpacing:1}}>{lv.e} {lv.l}</span>
        </div>
        <div style={{background:lv.bg,border:`1px solid ${lv.bd}`,borderRadius:16,padding:24,marginBottom:24}}>
          <h3 style={{color:lv.c,fontSize:18,fontWeight:700,margin:"0 0 8px"}}>{lv.m}</h3>
          <p style={{color:C.ch,fontSize:14,lineHeight:1.6,margin:0}}>{lv.d}</p>
        </div>
        <div style={{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:20,marginBottom:32}}>
          <h4 style={{color:"#fff",fontSize:14,margin:"0 0 16px",fontWeight:600}}>Vos réponses</h4>
          {QS.map((q,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,marginBottom:10,paddingBottom:10,borderBottom:i<9?"1px solid rgba(255,255,255,0.06)":"none"}}>
            <span style={{color:"rgba(255,255,255,0.6)",fontSize:12,lineHeight:1.5,flex:1}}>{q}</span>
            <span style={{background:ans[i]===0?"#DC262620":ans[i]===1?C.of+"20":C.vk+"20",color:ans[i]===0?"#DC2626":ans[i]===1?C.oc:C.va,padding:"2px 10px",borderRadius:12,fontSize:13,fontWeight:700,flexShrink:0}}>{ans[i]}/2</span>
          </div>)}
        </div>

        {tot<16?<div style={{background:`linear-gradient(135deg,${C.vp},${C.vk})`,borderRadius:16,padding:28,textAlign:"center",border:`1px solid ${C.op}30`}}>
          <p style={{color:C.op,fontSize:13,fontWeight:600,letterSpacing:1,margin:"0 0 8px",textTransform:"uppercase"}}>Ce score n'est qu'une photo floue</p>
          <h3 style={{color:"#fff",fontSize:20,fontWeight:700,margin:"0 0 12px",lineHeight:1.3}}>Obtenez votre Bilan de Maturité Organisationnelle</h3>
          <p style={{color:"rgba(255,255,255,0.7)",fontSize:14,margin:"0 0 20px",lineHeight:1.5}}>30 minutes · Gratuit · Personnalisé<br/>Réservé aux participants de la Master Class</p>
          {!showC?<button onClick={()=>setShowC(true)} style={{background:`linear-gradient(135deg,${C.op},${C.of})`,color:C.vp,border:"none",borderRadius:12,padding:"14px 36px",fontSize:15,fontWeight:700,boxShadow:"0 4px 20px rgba(196,164,30,0.3)"}}>JE VEUX MON DIAGNOSTIC COMPLET</button>
          :!sent?<div style={{textAlign:"left"}}>
            {["nom","pharmacie","tel","email"].map(f=><input key={f} type={f==="email"?"email":f==="tel"?"tel":"text"} placeholder={f==="nom"?"Dr...":f==="pharmacie"?"Nom de votre pharmacie":f==="tel"?"+225...":"Email"} value={contact[f]} onChange={e=>setContact(p=>({...p,[f]:e.target.value}))} style={{width:"100%",padding:"12px 16px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"#fff",fontSize:14,marginBottom:8,outline:"none",boxSizing:"border-box"}}/>)}
            <button onClick={()=>setSent(true)} disabled={!contact.nom||!contact.tel} style={{width:"100%",background:contact.nom&&contact.tel?`linear-gradient(135deg,${C.op},${C.of})`:"#555",color:contact.nom&&contact.tel?C.vp:"#999",border:"none",borderRadius:10,padding:"14px",fontSize:15,fontWeight:700,marginTop:8,cursor:contact.nom&&contact.tel?"pointer":"not-allowed"}}>RÉSERVER MON CRÉNEAU BMO →</button>
          </div>
          :<div style={{textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>✅</div><h4 style={{color:C.op,fontSize:16,margin:"0 0 8px"}}>Merci {contact.nom} !</h4><p style={{color:"rgba(255,255,255,0.7)",fontSize:14,margin:0,lineHeight:1.5}}>Nous vous recontactons sous 48h pour planifier votre Bilan de Maturité Organisationnelle.</p></div>}
        </div>
        :<div style={{background:C.vk+"15",borderRadius:16,padding:24,textAlign:"center",border:`1px solid ${C.vk}30`}}>
          <h3 style={{color:C.va,fontSize:18,fontWeight:700,margin:"0 0 8px"}}>Félicitations, vous faites partie de l'élite !</h3>
          <p style={{color:"rgba(255,255,255,0.7)",fontSize:14,margin:"0 0 16px",lineHeight:1.5}}>Votre officine est structurée. La prochaine étape : optimiser et accélérer la croissance.</p>
          <button onClick={()=>setShowC(true)} style={{background:`linear-gradient(135deg,${C.op},${C.of})`,color:C.vp,border:"none",borderRadius:12,padding:"14px 36px",fontSize:14,fontWeight:700}}>DISCUTONS DE VOTRE CROISSANCE</button>
        </div>}

        <div style={{marginTop:24,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:20,textAlign:"center",border:"1px solid rgba(255,255,255,0.06)"}}>
          <p style={{color:C.op,fontSize:12,fontWeight:600,margin:"0 0 4px",letterSpacing:1}}>MASTER CLASS — 25 AVRIL 2026</p>
          <p style={{color:"#fff",fontSize:14,fontWeight:600,margin:"0 0 4px"}}>Pharmacien Stratège × AT Agency</p>
          <p style={{color:"rgba(255,255,255,0.5)",fontSize:12,margin:0}}>Maison du Pharmacien — Abidjan · 125 000 F CFA</p>
        </div>
        <div style={{textAlign:"center",marginTop:24}}><button onClick={reset} style={{background:"none",border:"1px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.4)",padding:"8px 24px",borderRadius:8,fontSize:12}}>Refaire le diagnostic</button></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
